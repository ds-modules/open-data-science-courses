version: 1

project:
  title: Open Data Science Courses
  authors:
    - name: UC Berkeley
  bibliography:
    - references.bib
  jupyter: true
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: intro.md
    - title: Adoption Pages
      children:
        - file: adoption/data6.md
        - file: adoption/data8.md
       # - file: adoption/data100.md
    - title: edX Courses
      children:
        - file: edx-courses/C88C.md
        - file: edx-courses/88B.md
        - file: edx-courses/88E.md
       # - file: edx-courses/data8.md

site:
  template: book-theme
  options:
    base: /open-data-science-courses/
    favicon: favicon.ico
    logo: favicon.ico
    logo_text: Open Data Science Courses
    extra_css:
      - _static/custom.css
    navigation_with_keys: true
    show_toc_level: 2
    show_navbar_depth: 2
    use_issues_button: true
    use_repository_button: true
